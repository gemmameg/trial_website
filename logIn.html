<!DOCTYPE html>
<html>
<style>
   * {
  padding: 0;
  margin: 0;
}

/* NAV */
nav {
  position: fixed;
  top: 0;
  right: 0;
  width: 100%;
  display: flex;
  justify-content: flex-end;
  background: #E8BFAF;
  font-family: Hack, monospace;
}
h1{
position: fixed;
    top: 0;
    left: 0;
  margin: 25px;
  fontsize: 30px;
    z-index:1005;
  font-family: Hack, monospace;
}
.menuItems {
  list-style: none;
  display: flex;
}

.menuItems li {
  margin: 25px;
}

.menuItems li a {
  position: relative;
  display: inline-block;
  text-decoration: none;
  color: #333333;
  font-size: 30px;
}

.menuItems li a::before {
  content: attr(data-item);
  position: absolute;
  top: 0;
  left: 0;
  width: 0;
  height: 100%;
  overflow: hidden;
  color: #6D1F2F;
  transition: 0.5s;
}

.menuItems li a:hover::before {
  width: 100%;
}
  body{
    margin-top: 100px;
  }
  :root {
  --primary: #000000;
  --secondary: #FFFFFF;
  --accent: #FF5E5B;
  --shadow: 8px 8px 0px var(--primary);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Courier New', monospace;
}

body {
  background-color: var(--secondary);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
}

.login-container {
  width: 100%;
  max-width: 400px;
  border: 1px solid var(--primary);
  padding: 40px 30px;
  background-color: var(--secondary);
  box-shadow: var(--shadow);
  position: relative;
  border-radius: 12px;
}

.login-container::before {
  content: '';
  position: absolute;
  top: 6px;
  left: 6px;
  right: -6px;
  bottom: -6px;
  border: 1px solid var(--primary);
  z-index: -1;
  border-radius: 12px;
}

h2 {
  color: var(--primary);
  margin-bottom: 30px;
  font-size: 28px;
  font-weight: 700;
  text-align: center;
}

.input-group {
  margin-bottom: 20px;
  position: relative;
}

label {
  display: block;
  margin-bottom: 8px;
  font-weight: bold;
  color: var(--primary);
}

input {
  width: 100%;
  padding: 12px 15px;
  border: 2px solid var(--primary);
  background-color: var(--secondary);
  font-size: 16px;
  outline: none;
  transition: all 0.3s;
}

input:focus {
  box-shadow: 4px 4px 0px var(--primary);
}

button {
  width: 100%;
  padding: 12px;
  background-color: var(--accent);
  color: var(--secondary);
  border: 2px solid var(--primary);
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  margin-top: 10px;
  transition: all 0.3s;
}

button:hover {
  box-shadow: 4px 4px 0px var(--primary);
  transform: translate(-2px, -2px);
}

.divider {
  display: flex;
  align-items: center;
  margin: 25px 0;
  color: var(--primary);
  font-weight: bold;
}

.divider::before, .divider::after {
  content: "";
  flex: 1;
  border-bottom: 2px solid var(--primary);
  margin: 0 10px;
}

.social-login {
  display: flex;
  justify-content: center;
  gap: 15px;
}

.social-btn {
  width: 50px;
  height: 50px;
  border: 2px solid var(--primary);
  display: flex;
  justify-content: center;
  align-items: center;
  cursor: pointer;
  transition: all 0.3s;
}

.social-btn:hover {
  box-shadow: 4px 4px 0px var(--primary);
  transform: translate(-2px, -2px);
}

.footer {
  text-align: center;
  margin-top: 20px;
  color: var(--primary);
}

.footer a {
  color: var(--primary);
  font-weight: bold;
  text-decoration: underline;
}
    </style>
<h1>Reģistrēšanās</h1>
<nav>
    
    <ul class="menuItems">
      <li><a href='index.html' data-item='Atpakaļ'>Atpakaļ</a></li>
      
      <li><a href='#' data-item='Rezultāti'>Rezultāti</a></li>
      
    </ul>
</nav>
    
<body>
   
       
  


  <div class="login-container">
       
        <form id="log_in">
          <h2>LOGIN</h2>
        <div class="input-group">
            <label for="lietotajvards_log">Lietotājvārds</label>
               <input id="lietotajvards_log" placeholder="Lietotājvārds">
        </div>
        
        <div class="input-group">
            <label for="parole_log">Parole</label>
             <input id="parole_log" type="password" placeholder="Parole">
        </div>
    
        
         <button type="submit">Log in</button>
         </form>  
           <button id="logoutBtn">Iziet</button>
    
               <div class="footer">
           
                 <form id="change_password">
                   <h2> Vēlies nomainīt paroli?</h2>
<div class="input-group">
            <label for="parole_old">Vecā parole</label>
                <input id="parole_old" placeholder="Vecā parole">
        </div>
        
        <div class="input-group">
            <label for="parole_new">Jaunā parole</label>
             <input id="parole_new" type="password" placeholder="Jaunā parole">
        </div>
                   <button type="submit">Mainīt</button>
                 </form>
        </div>
    
        <div class="divider">Vai</div>
    
        
        <form id="registresanas">
          <h2>Izveido kontu</h2>
        <div class="input-group">
            <label for="vards">Vards</label>
              <input id="vards" placeholder="Vārds">
        </div>
        
        <div class="input-group">
            <label for="lietotajvards">Lietotājvārds</label>
             <input id="lietotajvards" placeholder="Lietotājvārds">
        </div>
    <div class="input-group">
            <label for="parole">Parole</label>
            <input id="parole" type="password" placeholder="Parole">
    </div>
       <div class="input-group">
            <label for="epasts">E-pasts</label>
            <input id="e_pasts" placeholder="E-pasts">
        </div>
        
        <button type="submit">Izveidot</button>
        </form>
       
        
       
    </div>

</body>
</html>
