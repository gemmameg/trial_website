<html>
  <head>
    <script src="static/majaslapa_1.js" defer></script>
</head>
<style>
* {
  padding: 0;
   margin: 0;
}

/* NAV */
nav {
  position: fixed;
  top: 0;
  right: 0;
  width: 100%;
  display: flex;
  justify-content: flex-end;
  background: #E8BFAF;
  font-family: Hack, monospace;
  z-index:1000;
}
h1{
  position: fixed;
  top: 0;
  left: 0;
  margin: 25px;
  font-size: 30px;
  z-index:1005;
  font-family: Hack, monospace;
}
.menuItems {
  list-style: none;
  display: flex;
}

.menuItems li {
  margin: 25px;
}

.menuItems li a {
  position: relative;
  display: inline-block;
  text-decoration: none;
  color: #333333;
  font-size: 30px;
}

.menuItems li a::before {
  content: attr(data-item);
  position: absolute;
  top: 0;
  left: 0;
  width: 0;
  height: 100%;
  overflow: hidden;
  color: #6D1F2F;
  transition: 0.5s;
}

.menuItems li a:hover::before {
  width: 100%;
}
  
  :root {
  
  --accent: #8C2F39;
  --shadow: 8px 8px 0px #6D1F2F;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Hack, monospace;
}

body {
  margin-top: 100px;
  background-color: #F2D6C9;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
  z-index:900;
}

.login-container {
  width: 100%;
  max-width: 400px;
  border: 1px solid #6D1F2F;
  padding: 40px 30px;
  background-color:#E8BFAF;
  box-shadow: var(--shadow);
  position: relative;
  border-radius: 12px;
  margin-left:40px;
  margin-right:40px;
 
}

.login-container::before {
  content: '';
  position: absolute;
  top: 6px;
  left: 6px;
  right: -6px;
  bottom: -6px;
  border: 1px solid #6D1F2F;
  z-index: -1;
  border-radius: 12px;
}

h2 {
  color: #333333;
  margin-bottom: 30px;
  font-size: 28px;
  font-weight: 700;
  text-align: center;
}

.input-group {
  margin-bottom: 20px;
  position: relative;
}

label {
  display: block;
  margin-bottom: 8px;
  font-weight: bold;
  color: #333333;
}

input {
  width: 100%;
  padding: 12px 15px;
  border: 2px solid #6D1F2F;
  background-color: #F2D6C9;
  font-size: 16px;
  outline: none;
  transition: all 0.3s;
}

input:focus {
  box-shadow: 4px 4px 0px #6D1F2F;
}

button {
  width: 100%;
  padding: 12px;
  background-color: var(--accent);
  color: var(--secondary);
  border: 2px solid #6D1F2F;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  margin-top: 10px;
  transition: all 0.3s;
}

button:hover {
  box-shadow: 4px 4px 0px #6D1F2F;
  transform: translate(-2px, -2px);
}





.footer {
  text-align: center;
  margin-top: 20px;
  color:  #333333;
}

.footer a {
  color: var(--primary);
  font-weight: bold;
  text-decoration: underline;
}
    </style>
<h1>Reģistrēšanās</h1>
<nav>
    
    <ul class="menuItems">
      <li><a href='index.html' data-item='Atpakaļ'>Atpakaļ</a></li>
      
      <li><a href='rezultats.html' data-item='Rezultāti'>Rezultāti</a></li>
      
    </ul>
</nav>

<body>
   
       
  


  <div class="login-container">
       
        <form id="log_in">
          <h2>Reģistrējies</h2>
        <div class="input-group">
            <label for="lietotajvards_log">Lietotājvārds</label>
               <input id="lietotajvards_log" placeholder="Lietotājvārds">
        </div>
        
        <div class="input-group">
            <label for="parole_log">Parole</label>
             <input id="parole_log" type="password" placeholder="Parole">
        </div>
    
        
         <button type="submit">Reģistrēties</button>
         </form>  
           <button id="logoutBtn" style="display:none;">Iziet</button>
          
    
               <div class="footer">
           
                 <form id="change_password" style="display:none;">
                   <h2> Vēlies nomainīt paroli?</h2>
<div class="input-group">
            <label for="parole_old">Vecā parole</label>
                <input id="parole_old" placeholder="Vecā parole">
        </div>
        
        <div class="input-group">
            <label for="parole_new">Jaunā parole</label>
             <input id="parole_new" type="password" placeholder="Jaunā parole">
        </div>
                   <button type="submit" >Mainīt</button>
                 </form>
        </div>
    
  </div>
    
        <div class="login-container">
        <form id="registresanas">
          <h2>Izveido kontu</h2>
        <div class="input-group">
            <label for="vards">Vards</label>
              <input id="vards" placeholder="Vārds">
        </div>
        
        <div class="input-group">
            <label for="lietotajvards">Lietotājvārds</label>
             <input id="lietotajvards" placeholder="Lietotājvārds">
        </div>
    <div class="input-group">
            <label for="parole">Parole</label>
            <input id="parole" type="password" placeholder="Parole">
    </div>
       <div class="input-group">
            <label for="epasts">E-pasts</label>
            <input id="e_pasts" placeholder="E-pasts">
        </div>
        
        <button type="submit">Izveidot</button>
        </form>
       
        
       
    </div>

</body>
</html>
