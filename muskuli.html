<!DOCTYPE html>
<html>


<style>
    * {
  padding: 0;
  margin: 0;
}
nav {
  position: fixed;
  top: 0;
  right: 0;
  width: 100%;
  display: flex;
  justify-content: flex-end;
  background: #E8BFAF;
  z-index: 1000;
  font-family: Hack, monospace;
}
h1{
position: fixed;
    top: 0;
    left: 0;
  margin: 25px;
  font-size: 30px;
    z-index:1005;
  font-family: Hack, monospace;
  color: #6D1F2F; /* color change*/
}
.menuItems {
  list-style: none;
  display: flex;
}

.menuItems li {
  margin: 25px;
}

.menuItems li a {
  position: relative;
  display: inline-block;
  text-decoration: none;
  color: #333333;
  font-size: 30px;
}

.menuItems li a::before {
  content: attr(data-item);
  position: absolute;
  top: 0;
  left: 0;
  width: 0;
  height: 100%;
  overflow: hidden;
  color: #6D1F2F;
  transition: 0.5s;
}

.menuItems li a:hover::before {
  width: 100%;
}


    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 20px;
    }
    #muscles-name {
      font-size: 24px;
      margin-bottom: 20px;
      min-height: 30px;
    }
    #muscles-game-container {
      position: relative;
      display: inline-block;
    }
    #muscles-img {
      width: 600px;
    }
    .muscles-dot {
      position: absolute;
      width: 15px;
      height: 15px;
      border-radius: 50%;
      background-color: #888;
      cursor: pointer;
      transition: background-color 0.3s;
    }
    .muscles-dot.correct {
      background-color: #4caf50;
    }
    .muscles-dot.wrong {
      background-color: #f44336;
    }

    #muscles-score {
        position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);

  background: #F2D6C9;
  border: 2px solid #6D1F2F; /* color change */
  border-radius: 20px;
  box-shadow: #6D1F2F 4px 4px 0 0; /* color change*/

  padding: 20px 40px;
  font-size: 24px;
  font-weight: bold;
  text-align: center;

  z-index: 2000; /* above everything */
  display: none;

  opacity: 0;
  transition: opacity 0.3s ease;
    }
   #muscles-score.show {
  display: block;
  opacity: 1;
  } 
    .button-panel {
  position: fixed;
  top: 100px;       /* below navbar */
  left: 20px;
  
  display: flex;
  flex-direction: column;  /* 👈 stack vertically */
  gap: 15px;

  z-index: 1005;
}

button {
  background-color: #F2D6C9;
  border: 2px solid #6D1F2F; /* coloe change*/
  border-radius: 30px;
  box-shadow: #6D1F2F 4px 4px 0 0; /* color change*/
  color: #333333;
  cursor: pointer;
  display: inline-block;
  font-weight: 600;
  font-size: 18px;
  padding: 0 18px;
  line-height: 50px;
  text-align: center;
  
  text-decoration: none;
  user-select: none;
  -webkit-user-select: none;
  touch-action: manipulation;
  z-index:1005;
}

button:hover {
  background-color: #E8BFAF;
  
}

button:active {
  
  box-shadow: #6D1F2F 2px 2px 0 0;
  border: #6D1F2F;
  transform: translate(2px, 2px);
}

@media (min-width: 768px) {
button {
    min-width: 120px;
    padding: 0 25px;
  }
}
  </style>
   <script src="static/majaslapa_1.js" defer></script>
    
    <h1>Muskuļi</h1>
    <nav>
    
    <ul class="menuItems">
      <li><a href='/' data-item='Atpakaļ'>Atpakaļ</a></li>
      <li><a href='/3' data-item='Reģistrēties'>Reģistrēties</a></li>
      <li><a href='/6' data-item='Rezultāti'>Rezultāti</a></li>
      
    </ul>
  </nav>
  <body>
    <div class="button-panel">
  <button id="muscles-start-btn">Sākt spēli</button>
  <button id="muscles-study-btn">Mācīties terminus</button>
  <button id="muscles-end-study-btn" style="display:none;">Beigt mācīšanos</button>
  <button id="muscles-exit-btn" style="display:none;">Beigt spēli</button>
</div>
  <div id="muscles-name"></div>
  <div id="muscles-game-container">
    <img id="muscles-img"
      src="https://www.image2url.com/r2/default/images/1777829532133-0cbe9ce8-175d-4937-84f3-4f10d61db6b0.png"
      alt="Muscle diagram">
  </div>
  <div id="muscles-score"></div>

</body>
</html>
