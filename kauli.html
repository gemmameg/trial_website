<!DOCTYPE html>
<html>

<style>
   * {
  padding: 0;
  margin: 0;
}
nav {
  position: fixed;
  top: 0;
  right: 0;
  width: 100%;
  display: flex;
  justify-content: flex-end;
  background: #E8BFAF;
  z-index: 1000;
  font-family: Hack, monospace;
}
h1{
position: fixed;
    top: 0;
    left: 0;
  margin: 25px;
  fontsize: 30px;
    z-index:1005;
  font-family: Hack, monospace;
  color: #333333;
}
.menuItems {
  list-style: none;
  display: flex;
}

.menuItems li {
  margin: 25px;
}

.menuItems li a {
  position: relative;
  display: inline-block;
  text-decoration: none;
  color: #333333;
  font-size: 30px;
}

.menuItems li a::before {
  content: attr(data-item);
  position: absolute;
  top: 0;
  left: 0;
  width: 0;
  height: 100%;
  overflow: hidden;
  color: #6D1F2F;
  transition: 0.5s;
}

.menuItems li a:hover::before {
  width: 100%;
}


body {
  
  text-align: center;
  margin: 20px;
}
#bone-name {
  font-size: 24px;
  margin-bottom: 20px;
  min-height: 30px;
}
#game-container {
  position: relative;
  display: inline-block;
}
#skeleton {
  width: 600px;
  z-index:900;/* 🔥 same size as working version */
}
.dot {
  position: absolute;
  width: 20px;
  height: 20px;
  border-radius: 50%;
  background-color: #888;
  cursor: pointer;
  transition: background-color 0.3s;
}
.dot.correct {
  background-color: #4caf50;
}
.dot.wrong {
  background-color: #f44336;
}
#score {
  margin-top: 20px;
  font-size: 20px;
  font-weight: bold;
}


button {
  background-color: #F2D6C9;
  border: 2px solid #333333;
  border-radius: 30px;
  box-shadow: #333333 4px 4px 0 0;
  color: #333333;
  cursor: pointer;
  display: inline-block;
  font-weight: 600;
  font-size: 18px;
  padding: 0 18px;
  line-height: 50px;
  text-align: center;
   margin-top: 75px;
  margin-left:15px;
  margin-right:15px;
  text-decoration: none;
  user-select: none;
  -webkit-user-select: none;
  touch-action: manipulation;
}

button:hover {
  background-color: #E8BFAF;
  
}

button:active {
  
  box-shadow: ##6D1F2F 2px 2px 0 0;
  transform: translate(2px, 2px);
}

@media (min-width: 768px) {
button {
    min-width: 120px;
    padding: 0 25px;
  }
}
 
  head{
    position: fixed;

  }
</style>
