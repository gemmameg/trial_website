<!DOCTYPE html>
<html>
<style>

   * {
  padding: 0;
  margin: 0;
}

/* NAV */
nav {
  position: fixed;
  top: 0;
  right: 0;
  width: 100%;
  display: flex;
  justify-content: flex-end;
  background: #E8BFAF;
  font-family: Hack, monospace;
}

.menuItems {
  list-style: none;
  display: flex;
}

.menuItems li {
  margin: 25px;
}

.menuItems li a {
  position: relative;
  display: inline-block;
  text-decoration: none;
  color: #333333;
  font-size: 30px;
}

.menuItems li a::before {
  content: attr(data-item);
  position: absolute;
  top: 0;
  left: 0;
  width: 0;
  height: 100%;
  overflow: hidden;
  color: #6D1F2F;
  transition: 0.5s;
}

.menuItems li a:hover::before {
  width: 100%;
}
h1{
  position: fixed;
  top: 0;
  left: 0;
  margin: 25px;
  font-size: 30px;
  z-index:1005;
  font-family: Hack, monospace;
}
body {
  padding-top: 80px;
  text-align: center;
  margin: 20px;
}
p {
  text-align: center;
  margin-top: 100px;
  font-size: 40px;
  color: #333333;
  font-family: Hack, monospace;
}
button {
  background-color: #F2D6C9;
  border: 2px solid #333333;
  border-radius: 30px;
  box-shadow: #333333 4px 4px 0 0;
  color: #333333;
  cursor: pointer;
  display: inline-block;
  font-weight: 600;
  font-size: 18px;
  padding: 0 18px;
  line-height: 50px;
  text-align: center;
  text-decoration: none;
  user-select: none;
  -webkit-user-select: none;
  touch-action: manipulation;
  z-index:1005;
}

button:hover {
  background-color: #E8BFAF;
  
}

button:active {
  
  box-shadow: #6D1F2F 2px 2px 0 0;
   border: #6D1F2F;
  transform: translate(2px, 2px);
}

@media (min-width: 768px) {
button {
    min-width: 120px;
    padding: 0 25px;
  }
}
</style>
<h1>Rezultāti</h1>

    </ul>
  </nav>

</html>
