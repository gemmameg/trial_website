<!DOCTYPE html>
<html>
<style>

   * {
  padding: 0;
  margin: 0;
}

/* NAV */
nav {
  position: fixed;
  top: 0;
  right: 0;
  width: 100%;
  display: flex;
  justify-content: flex-end;
  background: #E8BFAF;
  font-family: Hack, monospace;
}

.menuItems {
  list-style: none;
  display: flex;
}

.menuItems li {
  margin: 25px;
}

.menuItems li a {
  position: relative;
  display: inline-block;
  text-decoration: none;
  color: #333333;
  font-size: 30px;
}

.menuItems li a::before {
  content: attr(data-item);
  position: absolute;
  top: 0;
  left: 0;
  width: 0;
  height: 100%;
  overflow: hidden;
  color: #6D1F2F;
  transition: 0.5s;
}

.menuItems li a:hover::before {
  width: 100%;
}
h1{
  position: fixed;
  top: 0;
  left: 0;
  margin: 25px;
  font-size: 30px;
  z-index:1005;
  font-family: Hack, monospace;
  color: #6D1F2F; /* color change*/
}
body {
  padding-top: 80px;
  text-align: center;
  margin: 20px;
}
p {
  text-align: center;
  margin-top: 100px;
  font-size: 40px;
  color: #333333;
  font-family: Hack, monospace;
}
button {
  background-color: #F2D6C9;
  border: 2px solid #6D1F2F;
  border-radius: 30px;
  box-shadow: #6D1F2F 4px 4px 0 0;
  color: #333333;
  cursor: pointer;
  display: inline-block;
  font-weight: 600;
  font-size: 18px;
  padding: 0 18px;
  line-height: 50px;
  text-align: center;
  text-decoration: none;
  user-select: none;
  -webkit-user-select: none;
  touch-action: manipulation;
  z-index:1005;
}

button:hover {
  background-color: #E8BFAF;
  
}

button:active {
  
  box-shadow: #6D1F2F 2px 2px 0 0;
   border: #6D1F2F;
  transform: translate(2px, 2px);
}

@media (min-width: 768px) {
button {
    min-width: 120px;
    padding: 0 25px;
  }
}
 $gl-lg         : "screen and (max-width: 80em)"; 
  table 			      { 
  border-spacing: 1; 
  border-collapse: collapse; 
  background:white;
  border-radius:6px;
  overflow:hidden;
  max-width:800px; 
  width:100%;
  margin:0 auto;
  position:relative;
  
  *               { position:relative }
  
  td,th           { padding-left:8px}

  thead tr        { 
    height:60px;
    background:#FFED86;
    font-size:16px;
  }
  
  tbody tr        { height:48px; border-bottom:1px solid #E3F1D5 ;
    &:last-child  { border:0; }
  }
  
 	td,th 					{ text-align:left;
		&.l 					{ text-align:right }
		&.c 					{ text-align:center }
		&.r 					{ text-align:center }
	}
}


@media #{$gl-lg}              {
  
  table					              { display:block;
	  > *,tr,td,th              { display:block }
    
    thead                     { display:none }
    tbody tr                  { height:auto; padding:8px 0;
      td                      { padding-left:45%; margin-bottom:12px;
        &:last-child          { margin-bottom:0 }
        &:before              { 
          position:absolute;
          font-weight:700;
          width:40%;
          left:10px;
          top:0
        }
        
        &:nth-child(1):before { content:"Code";}
        &:nth-child(2):before { content:"Stock";}
        &:nth-child(3):before { content:"Cap";}
        &:nth-child(4):before { content:"Inch";}
        &:nth-child(5):before { content:"Box Type";}
      }        
    }
  }
}  	
</style>
<h1>Rezultāti</h1>
<nav>
    <ul class="menuItems">
      <li><a href='logIn.html' data-item='Reģistrēties'>Reģistrēties</a></li>
      <li><a href='index.html' data-item='Atpakaļ'>Atpakaļ</a></li>
    </ul>
  </nav>

<body>
 <script src="test.js" defer></script>     
<button id="paradit_rez">Parādīt manus rezultātus</button>
<table id="results-table">
  <thead>
    <tr>
      <th>Rezultāts (%)</th>
      <th>Spēle</th>
      <th>Mēģinājums</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

</body>
</html>
