<!DOCTYPE html>
<html>
<style>

   * {
  padding: 0;
  margin: 0;
}

/* NAV */
nav {
  position: fixed;
  top: 0;
  right: 0;
  width: 100%;
  display: flex;
  justify-content: flex-end;
  background: #E8BFAF;
  font-family: Hack, monospace;
}

.menuItems {
  list-style: none;
  display: flex;
}

.menuItems li {
  margin: 25px;
}

.menuItems li a {
  position: relative;
  display: inline-block;
  text-decoration: none;
  color: #333333;
  font-size: 30px;
}

.menuItems li a::before {
  content: attr(data-item);
  position: absolute;
  top: 0;
  left: 0;
  width: 0;
  height: 100%;
  overflow: hidden;
  color: #6D1F2F;
  transition: 0.5s;
}

.menuItems li a:hover::before {
  width: 100%;
}
h1{
  position: fixed;
  top: 0;
  left: 0;
  margin: 25px;
  font-size: 30px;
  z-index:1005;
  font-family: Hack, monospace;
  color: #6D1F2F; /* color change*/
}
body {
  padding-top: 80px;
  text-align: center;
  margin: 20px;
	background: #F2D6C9;
}
p {
  text-align: center;
  margin-top: 100px;
  font-size: 40px;
  color: #333333;
  font-family: Hack, monospace;
}
button {
  background-color: #F2D6C9;
  border: 2px solid #6D1F2F;
  border-radius: 30px;
  box-shadow: #6D1F2F 4px 4px 0 0;
  color: #333333;
  cursor: pointer;
  display: inline-block;
  font-weight: 600;
  font-size: 18px;
  padding: 0 18px;
  line-height: 50px;
  text-align: center;
  text-decoration: none;
  user-select: none;
  -webkit-user-select: none;
  touch-action: manipulation;
  z-index:1005;
}

button:hover {
  background-color: #E8BFAF;
  
}

button:active {
  
  box-shadow: #6D1F2F 2px 2px 0 0;
   border: #6D1F2F;
  transform: translate(2px, 2px);
}

@media (min-width: 768px) {
button {
    min-width: 120px;
    padding: 0 25px;
  }
}
	
table {
  border-spacing: 1px;
  border-collapse: collapse;
  background: white;
  border-radius: 6px;
  overflow: hidden;
  max-width: 800px;
  width: 100%;
  margin: 20px auto;
  background: #E8BFAF;;
}

td, th {
  padding-left: 8px;
  text-align: left;
}

thead tr {
  height: 60px;
  background: #6D1F2F;
  font-size: 16px;
}

tbody tr {
  height: 48px;
  border-bottom: 1px solid #6D1F2F;
}

tbody tr:last-child {
  border-bottom: none;
}
	#results-table {
  display: none;
}
</style>
<h1>Rezultāti</h1>
<nav>
    <ul class="menuItems">
      <li><a href='logIn.html' data-item='Reģistrēties'>Reģistrēties</a></li>
      <li><a href='index.html' data-item='Atpakaļ'>Atpakaļ</a></li>
    </ul>
  </nav>

<body>
 <script src="test.js" defer></script>     
<button id="paradit_rez">Parādīt manus rezultātus</button>
<table id="results-table">
  <thead>
    <tr>
      <th>Spēle</th>
      <th>Mēģinājums</th>
      <th>Rezultāts</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

</body>
</html>
